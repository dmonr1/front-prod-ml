<app-shell>
  <section class="setup-grid">
    @for (modulo of modulos; track modulo.key) {
      <article class="setup-card" [class.prioridad]="modulo.status === 'prioridad'">
        <div class="setup-card-head">
          <span class="setup-icon"><i [class]="modulo.icon"></i></span>
          <span class="setup-state" [class.pending]="modulo.status === 'pendiente'">{{ modulo.helper }}</span>
        </div>

        <div>
          <h3>{{ modulo.title }}</h3>
          <p>{{ modulo.description }}</p>
        </div>

        <div class="setup-card-foot">
          <span class="module-type">{{ modulo.status === 'prioridad' ? 'Arranque principal' : 'Configuracion siguiente' }}</span>
          <a class="module-link" [routerLink]="modulo.route">
            Abrir modulo
            <i class="fa-solid fa-arrow-right"></i>
          </a>
        </div>
      </article>
    }
  </section>
</app-shell>
